<link rel="stylesheet" href="/styles.css" />

<h1>PR Time-to-Merge Stats</h1>
<p class="subtitle">
  Time to merge is measured from when a PR is ready for review to when it
  merges, <strong>excluding weekends</strong> (Saturdays and Sundays, UTC).
</p>

<div id="controls" class="controls hidden">
  <div class="control">
    <label for="repo-select">Repository</label>
    <select id="repo-select"></select>
  </div>

  <div class="control hidden" id="category-filter-control">
    <span class="control-label">Categories</span>
    <div class="checkbox-group" id="category-filter" role="group" aria-label="Category filter"></div>
  </div>

  <div class="control">
    <label for="ttm-threshold">Max time to merge (days)</label>
    <input type="number" id="ttm-threshold" min="1" step="1" value="7" />
  </div>
</div>

<div id="empty-message" class="message hidden">No repos tracked yet.</div>

<div id="report" class="hidden">
  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <div class="table-scroll">
    <table id="data-table">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

  <p id="footnote" class="footnote"></p>
</div>

<script src="/chart.umd.js"></script>
<script type="module" src="/app.js"></script>
