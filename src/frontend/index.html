<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pr-stats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="card">
        <header class="topbar">
          <div class="topbar-brand">
            <span class="topbar-dot"></span>
            <span class="topbar-name">pr-stats</span>
          </div>
        </header>

        <div class="card-body">
          <h1>Pull Request Stats</h1>
          <p class="subtitle">
            All metrics are measured from when a PR becomes ready for review —
            to its first review, first approval, and merge —
            <strong>excluding weekends</strong> (Saturdays and Sundays, UTC).
          </p>

          <div id="controls" class="controls hidden">
            <div class="control">
              <label for="repo-select">Repository</label>
              <div class="select-wrap">
                <select id="repo-select"></select>
                <svg
                  class="select-chevron"
                  width="12"
                  height="12"
                  viewBox="0 0 12 12"
                  aria-hidden="true"
                >
                  <path
                    d="M2.5 4.5 L6 8 L9.5 4.5"
                    fill="none"
                    stroke="#8B919C"
                    stroke-width="1.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </div>
            </div>

            <div class="control">
              <span class="control-label">Aggregate</span>
              <div
                class="segmented"
                id="aggregate-control"
                role="radiogroup"
                aria-label="Aggregate"
              >
                <label>
                  <input type="radio" name="aggregate" value="mean" checked />
                  <span>Mean</span>
                </label>
                <label>
                  <input type="radio" name="aggregate" value="median" />
                  <span>Median</span>
                </label>
              </div>
            </div>

            <div class="control hidden" id="category-filter-control">
              <span class="control-label">Categories</span>
              <div
                class="checkbox-group"
                id="category-filter"
                role="group"
                aria-label="Category filter"
              ></div>
            </div>

            <div class="control">
              <label for="outlier-threshold">Outlier threshold (days)</label>
              <input type="number" id="outlier-threshold" min="1" step="1" value="7" />
            </div>
          </div>

          <div id="empty-message" class="message hidden">No repos tracked yet.</div>

          <div id="report" class="hidden">
            <div class="chart-header">
              <span class="chart-caption" id="chart-caption"></span>
              <div class="legend">
                <span class="legend-item">
                  <span class="legend-swatch legend-swatch--first-review"></span
                  >First review
                </span>
                <span class="legend-item">
                  <span class="legend-swatch legend-swatch--approval"></span
                  >Approval
                </span>
                <span class="legend-item">
                  <span class="legend-swatch legend-swatch--merge"></span>Merge
                </span>
              </div>
            </div>

            <div class="chart-wrap">
              <canvas id="chart"></canvas>
            </div>

            <div class="chart-header chart-header--count">
              <span class="chart-caption">PRs · count</span>
            </div>

            <div class="chart-wrap chart-wrap--count">
              <canvas id="count-chart"></canvas>
            </div>

            <div class="table-scroll">
              <table id="data-table">
                <thead></thead>
                <tbody></tbody>
              </table>
            </div>

            <p id="footnote" class="footnote"></p>
          </div>

          <p id="generated-at" class="footnote"></p>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
